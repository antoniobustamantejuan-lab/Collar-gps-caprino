<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
font-family:Arial;
margin:0;
padding:0;
}

#map{
height:75vh;
width:100%;
}

.panel{
padding:10px;
background:#f2f2f2;
}

button,input{
padding:8px;
margin:4px;
font-size:16px;
}
</style>
</head>

<body>

<div class="panel">

<input type="date" id="fecha">

<button onclick="cargarTodo()">Ver Día</button>

<button onclick="modoEditar()">Editar Cerco</button>

<button onclick="guardarCerco()">Guardar Cerco</button>

<span id="info"></span>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzBW9V9DH_kya5vv0Lc1fCCSd6MDfmQsqRgWRz7Z-a0wP_4XID7WgIXk_Xzfz6xsgzO/exec";

let map = L.map('map').setView([-27.48,-58.83],15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let polygon;
let puntosCerco = [];
let markers = [];
let editando = false;

//==================
function cargarTodo(){
cargarCerco();
cargarHistorial();
}

//==================
function cargarCerco(){

fetch(URL + "?leerCerco=1")
.then(r=>r.json())
.then(data=>{

puntosCerco = data;

if(polygon) map.removeLayer(polygon);

polygon = L.polygon(puntosCerco,{
color:'green',
fillOpacity:0.1
}).addTo(map);

});
}

//==================
function cargarHistorial(){

markers.forEach(m=>map.removeLayer(m));
markers=[];

let fecha = document.getElementById("fecha").value;

fetch(URL + "?historial=" + fecha)
.then(r=>r.json())
.then(data=>{

let salidas = 0;

data.forEach(p=>{

let color = (p.estado=="Fuera") ? "red" : "blue";

if(p.estado=="Fuera") salidas++;

let marker = L.circleMarker([p.lat,p.lng],{
radius:6,
color:color,
fillOpacity:1
}).addTo(map);

marker.bindPopup(
"Hora: "+p.hora+
"<br>Batería: "+p.bateria+"%"
);

markers.push(marker);

});

document.getElementById("info").innerHTML =
"Salidas: " + salidas;

});
}

//==================
function modoEditar(){

editando=true;
puntosCerco=[];

if(polygon) map.removeLayer(polygon);

alert("Toque el mapa para crear puntos");
}

//==================
map.on('click',function(e){

if(!editando) return;

puntosCerco.push({
lat:e.latlng.lat,
lng:e.latlng.lng
});

if(polygon) map.removeLayer(polygon);

polygon = L.polygon(puntosCerco,{
color:'orange'
}).addTo(map);

});

//==================
function guardarCerco(){

fetch(URL + "?guardarCerco=" +
encodeURIComponent(JSON.stringify(puntosCerco)))
.then(r=>r.text())
.then(t=>{

alert("Cerco guardado");
editando=false;

});

}

//==================
cargarTodo();

</script>

</body>
</html>
