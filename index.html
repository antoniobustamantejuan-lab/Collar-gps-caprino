<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

.top{
padding:10px;
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.card{
background:white;
padding:12px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,.15);
font-size:15px;
}

.controls{
padding:10px;
display:flex;
gap:8px;
flex-wrap:wrap;
}

button,input{
padding:10px;
font-size:15px;
border:none;
border-radius:8px;
}

button{
background:#1e88e5;
color:white;
}

#map{
height:65vh;
width:100%;
}

</style>
</head>

<body>

<div class="top">

<div class="card" id="bat">🔋 Batería: --%</div>
<div class="card" id="ult">📶 Última conexión: --</div>
<div class="card" id="cru">🚨 Cruces: --</div>
<div class="card" id="dis">📏 Distancia: -- m</div>

</div>

<div class="controls">
<input type="date" id="fecha">
<button onclick="cargar()">Actualizar</button>
<button onclick="editarCerco()">Editar Cerco</button>
<button onclick="guardarCerco()">Guardar Cerco</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const URL =
"https://script.google.com/macros/s/AKfycbyKu3ximhGQtsDZlGxzlZX9xx9cuVEXfyNcQGUpERbJa_cPtsI9yeEY54DXAadzSqc/exec";

let map = L.map('map').setView([-27.48,-58.83],16);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(map);

let polygon;
let cerco = [];
let markers = [];
let editando = false;

//========================
// FECHA HOY
//========================
document.getElementById("fecha").value =
new Date().toISOString().split("T")[0];

//========================
// CARGAR TODO
//========================
function cargar(){
cargarCerco();
cargarPanel();
}

//========================
// CARGAR CERCO
//========================
function cargarCerco(){

fetch(URL + "?leerCerco=1")
.then(r=>r.json())
.then(data=>{

cerco = data;

if(polygon) map.removeLayer(polygon);

polygon = L.polygon(cerco,{
color:"green",
fillOpacity:0.08
}).addTo(map);

});

}

//========================
// PANEL + HISTORIAL
//========================
function cargarPanel(){

markers.forEach(m=>map.removeLayer(m));
markers=[];

let fecha = document.getElementById("fecha").value;

fetch(URL + "?panel=" + fecha)
.then(r=>r.json())
.then(data=>{

document.getElementById("bat").innerHTML =
"🔋 Batería: " + data.bateria + "%";

document.getElementById("ult").innerHTML =
"📶 Última conexión: " + data.ultima;

document.getElementById("cru").innerHTML =
"🚨 Cruces: " + data.cruces;

document.getElementById("dis").innerHTML =
"📏 Distancia: " + data.distancia + " m";

if(data.historial.length>0){

let ultimo =
data.historial[data.historial.length-1];

map.setView([ultimo.lat, ultimo.lng],17);

data.historial.forEach(p=>{

let adentro =
pointInPolygon([p.lat,p.lng],cerco);

let color = adentro ? "blue" : "red";

let mk = L.circleMarker(
[p.lat,p.lng],
{
radius:6,
color:color,
fillOpacity:1
}).addTo(map);

markers.push(mk);

});

}

});

}

//========================
// RAY CASTING
//========================
function pointInPolygon(point, vs){

let x = point[0], y = point[1];
let inside = false;

for (let i=0,j=vs.length-1;i<vs.length;j=i++) {

let xi = vs[i].lat, yi = vs[i].lng;
let xj = vs[j].lat, yj = vs[j].lng;

let intersect =
((yi > y) != (yj > y))
&&
(x < (xj - xi) * (y - yi) / (yj - yi) + xi);

if (intersect) inside = !inside;
}

return inside;
}

//========================
// EDITAR CERCO
//========================
function editarCerco(){

editando = true;
cerco = [];

if(polygon) map.removeLayer(polygon);

alert("Toque el mapa para marcar puntos");

}

//========================
// CLICK MAPA
//========================
map.on('click', function(e){

if(!editando) return;

cerco.push({
lat:e.latlng.lat,
lng:e.latlng.lng
});

if(polygon) map.removeLayer(polygon);

polygon = L.polygon(cerco,{
color:"orange"
}).addTo(map);

});

//========================
// GUARDAR
//========================
function guardarCerco(){

fetch(URL + "?guardarCerco=" +
encodeURIComponent(JSON.stringify(cerco)))
.then(r=>r.text())
.then(t=>{

alert("Cerco guardado");
editando=false;

});

}

//========================
cargar();

</script>

</body>
</html>
