<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Collar GPS Caprino</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

header{
background:#0f172a;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
padding:15px;
max-width:1400px;
margin:auto;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:15px;
}

.card{
background:white;
padding:18px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
}

.card h3{
margin:0;
font-size:14px;
color:#666;
}

.card p{
font-size:28px;
margin:10px 0 0;
font-weight:bold;
}

.section{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
}

#mapa{
height:75vh;
border-radius:12px;
margin-top:15px;
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
}

button,input{
padding:12px;
border:none;
border-radius:10px;
font-size:15px;
}

button{
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

</style>
</head>
<body>

<header>Collar GPS Caprino</header>

<div class="container">

<div class="cards">

<div class="card">
<h3>Batería</h3>
<p id="bat">--%</p>
</div>

<div class="card">
<h3>Última conexión</h3>
<p id="hora">--</p>
</div>

<div class="card">
<h3>Cruces hoy</h3>
<p id="cruces">--</p>
</div>

<div class="card">
<h3>Distancia</h3>
<p id="dist">-- m</p>
</div>

</div>

<div class="section">

<div class="controls">

<input type="date" id="fecha">

<button onclick="cargarTodo()">Actualizar</button>

<button onclick="activarEdicion()">Editar cerco</button>

<button onclick="guardarCerco()">Guardar cerco</button>

</div>

<div id="mapa"></div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

<script>

// CAMBIAR POR TU URL
const backend="https://script.google.com/macros/s/AKfycbxT0BlHicZaOaLgmZjBh5-014jBLFitLm4zEkYaLx3YByJBr_inYrjryEn6GPSjKYw8/exec";

// fecha hoy
document.getElementById("fecha").value =
new Date().toISOString().split("T")[0];

// mapa
var mapa=L.map('mapa').setView([-27.48,-58.83],16);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
).addTo(mapa);

var drawnItems = new L.FeatureGroup();
mapa.addLayer(drawnItems);

var historialLayer = L.layerGroup().addTo(mapa);

var drawControl = new L.Control.Draw({
draw:{
polygon:true,
polyline:false,
rectangle:false,
circle:false,
marker:false,
circlemarker:false
},
edit:{featureGroup:drawnItems}
});

mapa.on(L.Draw.Event.CREATED,function(e){

drawnItems.clearLayers();
drawnItems.addLayer(e.layer);

});

//-------------------------------------
// PANEL
//-------------------------------------
function cargarPanel(){

let fecha=document.getElementById("fecha").value;

fetch(
backend+"?panel="+fecha+"&t="+Date.now(),
{mode:"cors"}
)
.then(r=>r.json())
.then(data=>{

bat.innerHTML=data.bateria+"%";
hora.innerHTML=data.ultima;
cruces.innerHTML=data.cruces;
dist.innerHTML=data.distancia+" m";

historialLayer.clearLayers();

if(data.historial.length>0){

let linea=[];

data.historial.forEach(p=>{

linea.push([p.lat,p.lng]);

L.circleMarker(
[p.lat,p.lng],
{radius:5,color:"blue"}
).addTo(historialLayer);

});

L.polyline(linea,{weight:3})
.addTo(historialLayer);

mapa.setView(
linea[linea.length-1],17
);

}

})
.catch(err=>console.log(err));

}

//-------------------------------------
// CERCO
//-------------------------------------
function cargarCerco(){

fetch(
backend+"?leerCerco=1&t="+Date.now(),
{mode:"cors"}
)
.then(r=>r.text())
.then(txt=>{

if(txt=="") return;

let puntos=[];

txt.split(";").forEach(par=>{

if(par!=""){

let xy=par.split(",");

puntos.push([
parseFloat(xy[0]),
parseFloat(xy[1])
]);

}

});

drawnItems.clearLayers();

drawnItems.addLayer(
L.polygon(puntos,{
color:"green",
weight:3,
fillOpacity:.08
})
);

});

}

function guardarCerco(){

if(drawnItems.getLayers().length==0){
alert("Dibuje un cerco");
return;
}

let capa=drawnItems.getLayers()[0];

let coords=capa.getLatLngs()[0];

let txt="";

coords.forEach(p=>{

txt+=p.lat.toFixed(6)+","+p.lng.toFixed(6)+";";

});

fetch(
backend+"?cerco="+encodeURIComponent(txt)
)
.then(r=>r.text())
.then(t=>alert("Cerco guardado"));

}

function activarEdicion(){

mapa.addControl(drawControl);

}

//-------------------------------------
function cargarTodo(){

cargarCerco();
cargarPanel();

}

cargarTodo();

setInterval(cargarPanel,30000);

</script>

</body>
</html>
